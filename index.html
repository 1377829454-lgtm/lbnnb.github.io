<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>专属陪伴约定书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #ffd6e0, #fff5f8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
        }
        .card {
            background: #ffffffdd;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 440px;
            padding: 35px 28px;
            border-radius: 24px;
            box-shadow: 0 8px 30px #ffc8d680;
            text-align: center;
        }
        h1 {
            color: #d6486b;
            font-size: 26px;
            margin-bottom: 22px;
            letter-spacing: 2px;
        }
        .line {
            width: 70px;
            height: 2px;
            background: #f29fb4;
            margin: 0 auto 24px;
        }
        p {
            color: #444;
            font-size: 16px;
            line-height: 1.85;
            margin: 11px 0;
        }
        .text-love {
            color: #c93c5e;
            font-weight: bold;
            font-size: 18px;
            margin: 28px 0;
        }
        .heart {
            font-size: 48px;
            color: #ff7b9c;
            margin-bottom: 12px;
        }
        /* 签名区域 */
        .sign-box {
            margin-top: 35px;
            border-top: 1px solid #f0c8d3;
            padding-top: 25px;
        }
        .sign-title {
            font-size: 15px;
            color: #666;
            margin-bottom: 12px;
        }
        #signCanvas {
            border: 1px solid #e8c2cf;
            border-radius: 12px;
            background: #fff;
            width: 100%;
            height: 140px;
            touch-action: none;
        }
        .btn-group {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 9px 18px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        #saveBtn {
            background: #f287a1;
            color: white;
        }
        #clearBtn {
            background: #eee;
            color: #555;
        }
        .tip {
            margin-top: 10px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">♡</div>
        <h1>专属陪伴约定书</h1>
        <div class="line"></div>
        <p>我明白你常常独自被困在低落情绪里</p>
        <p>对身边所有人都下意识疏远，包括家人</p>
        <p>内心翻涌煎熬时，总找不到温柔安抚自己的方式</p>
        <p>不想社交、不愿见任何人，我都完全尊重你</p>
        <div class="text-love">
            无论你陷入怎样难熬的时刻，我都会守在你身边<br>
            答应我，多一点温柔好好善待自己
        </div>
        <p>不必强迫自己开朗，不用硬撑假装一切安好</p>
        <p>难过崩溃的时候，记得别为难、伤害自己</p>
        <p>不用害怕不懂经营感情，我们慢慢磨合就好</p>
        <p>你值得被好好对待，首先要学会好好爱自己</p>
        <p>往后所有难熬的情绪，我都会陪你一同化解</p>

        <!-- 手写签名区域 -->
        <div class="sign-box">
            <div class="sign-title">在此手写签名，确认这份长久陪伴的约定</div>
            <canvas id="signCanvas"></canvas>
            <div class="btn-group">
                <button id="saveBtn">保存签名</button>
                <button id="clearBtn">清空重写</button>
            </div>
            <div class="tip">签名自动保存在页面，刷新网页也不会消失</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        let drawing = false;

        // 适配屏幕分辨率
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#222';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 鼠标/触屏坐标转换
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            }
        }

        // 绘制逻辑
        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }
        function stopDraw() {
            drawing = false;
        }

        // 绑定触屏、鼠标事件
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDraw);

        // 本地存储签名（Base64图片）
        function loadSign() {
            const saved = localStorage.getItem('userSign');
            if (saved) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img,0,0);
                img.src = saved;
            }
        }
        loadSign();

        // 保存按钮
        saveBtn.onclick = () => {
            const dataUrl = canvas.toDataURL('image/png');
            localStorage.setItem('userSign', dataUrl);
            alert('签名保存成功！刷新页面也会保留');
        }
        // 清空按钮
        clearBtn.onclick = () => {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            localStorage.removeItem('userSign');
        }
    </script>
</body>
</html>
